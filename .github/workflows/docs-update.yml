name: Auto-update docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if ! npm ci --prefer-offline --ignore-scripts; then
            echo "npm ci failed; falling back to npm install --ignore-scripts"
            npm install --ignore-scripts
          fi
        env:
          # Skip optional native binaries; we only need the installed packages
          # for the docs script (which uses only Node built-ins)
          NPM_CONFIG_OPTIONAL: 'false'

      - name: Run docs update
        run: npm run docs:update
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Commit updated docs (if any changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SITEMAP.md CODEBASE-MAP.md ROLLBACK.md VERCEL.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-update [docs-update] [skip ci]"
            git push
          fi
