# .github/workflows/vercel-deploy-docs.yml
#
# Appends a Vercel deployment entry to VERCEL.md after a successful
# Vercel deployment. Triggered by workflow_dispatch (Vercel deploy hook)
# or repository_dispatch (Vercel webhook).
#
# Setup:
#   1. In Vercel project -> Settings -> Git -> Deploy Hooks,
#      create a hook pointing at this repo + branch=main.
#   2. Or configure a Vercel webhook that fires a repository_dispatch
#      event with event-type "vercel-deployment".

name: Update VERCEL.md on deployment

on:
  workflow_dispatch:
    inputs:
      vercel_url:
        description: "Deployment URL (e.g. my-app-abc123.vercel.app)"
        required: false
      vercel_env:
        description: "Deployment environment (production|preview)"
        required: false
        default: production

  repository_dispatch:
    types:
      - vercel-deployment

permissions:
  contents: write

jobs:
  update-vercel-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node (if not in devDeps)
        run: npm list ts-node || npm install --no-save ts-node

      - name: Append VERCEL.md deployment entry
        env:
          DOCS_MODE: deployment
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERCEL_URL: >-
            ${{
              github.event.inputs.vercel_url ||
              github.event.client_payload.deployment_url ||
              ''
            }}
          VERCEL_ENV: >-
            ${{
              github.event.inputs.vercel_env ||
              github.event.client_payload.environment ||
              'unknown'
            }}
        run: npx ts-node --project tsconfig.json --skip-project scripts/update-docs.ts

      - name: Commit VERCEL.md back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERCEL.md
          git diff --cached --quiet || git commit -m "[docs-update] append Vercel deployment entry"
          git push
